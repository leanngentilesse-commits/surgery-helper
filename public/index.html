<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手术机器人对标助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #1E4A76;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        #searchInput {
            width: 400px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #1E4A76;
            border-radius: 25px;
            outline: none;
        }
        
        #searchBtn {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #1E4A76;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        #searchBtn:hover {
            background-color: #183B60;
        }
        
        /* 热门术式区域 */
        .hot-procedures {
            margin-top: 40px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        
        .hot-procedures h2 {
            color: #1E4A76;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
            padding-bottom: 15px;
            border-bottom: 2px solid #E8F0FE;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .hot-procedures h2::before {
            content: "🔥";
            font-size: 20px;
        }
        
        .hot-procedures-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .hot-procedure-item {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #E2E8F0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
        }
        
        .hot-procedure-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: #1E4A76;
            background: #1E4A76;
            color: white;
        }
        
        .hot-procedure-item span {
            font-size: 14px;
            font-weight: bold;
        }
        
        /* 菜单样式 */
        .menu-container {
            margin-top: 30px;
        }
        
        .main-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
            justify-content: center;
        }
        
        .menu-item {
            background: white;
            border: 2px solid #1E4A76;
            border-radius: 25px;
            padding: 12px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: #1E4A76;
            white-space: nowrap;
            width: 100px;
            text-align: center;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }
            
            #searchInput {
                width: 250px;
                padding: 10px;
                font-size: 14px;
            }
            
            #searchBtn {
                padding: 10px 20px;
                font-size: 14px;
                margin-left: 5px;
            }
            
            .menu-item {
                padding: 8px 0;
                font-size: 14px;
                width: 90px;
                border-radius: 20px;
            }
            
            /* 调整主菜单布局为网格，确保在移动设备上能显示所有科室 */
            #mainMenu {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 10px;
            }
            
            .submenu-container {
                padding: 20px;
                margin-top: 20px;
            }
            
            .submenu-title {
                font-size: 20px;
                margin-bottom: 20px;
            }
        }
        
        @media (max-width: 480px) {
            #mainMenu {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 8px;
            }
            
            .menu-item {
                padding: 6px 0;
                font-size: 12px;
                width: 100%;
                max-width: 80px;
                border-radius: 15px;
            }
            
            #searchInput {
                width: 100%;
                padding: 8px;
                font-size: 12px;
            }
            
            #searchBtn {
                padding: 8px 16px;
                font-size: 12px;
                margin-left: 0;
            }
        }
        
        @media (max-width: 360px) {
            #mainMenu {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 6px;
            }
            
            .menu-item {
                padding: 5px 0;
                font-size: 11px;
                max-width: 70px;
                border-radius: 12px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .submenu-title {
                font-size: 16px;
            }
        }
        
        @media (max-width: 320px) {
            #mainMenu {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
            }
            
            .menu-item {
                padding: 4px 0;
                font-size: 10px;
                max-width: none;
                border-radius: 10px;
            }
            
            h1 {
                font-size: 18px;
            }
        }
        
        /* 术式详情页面响应式调整 */
        @media (max-width: 768px) {
            #procedurePage .container {
                padding: 20px;
            }
            
            #backBtn {
                padding: 10px 20px;
                font-size: 14px;
            }
            
            #procedureTitle {
                font-size: 24px;
            }
        }
        
        @media (max-width: 480px) {
            #procedurePage .container {
                padding: 15px;
            }
            
            #backBtn {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            #procedureTitle {
                font-size: 20px;
            }
            
            .nav-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 360px) {
            #backBtn {
                padding: 6px 12px;
                font-size: 11px;
            }
            
            #procedureTitle {
                font-size: 18px;
            }
            
            .nav-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
        
        @media (max-width: 320px) {
            #backBtn {
                padding: 5px 10px;
                font-size: 10px;
            }
            
            #procedureTitle {
                font-size: 16px;
            }
            
            .nav-btn {
                padding: 6px 10px;
                font-size: 11px;
            }
        }
        
        .menu-item:hover {
            background: #1E4A76;
            color: white;
            transform: translateY(-2px);
        }
        
        .menu-item.active {
            background: #1E4A76;
            color: white;
        }
        
        /* 二级菜单样式 */
        .submenu-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            margin-top: 30px;
            transition: all 0.3s ease;
        }
        
        .submenu-title {
            color: #1E4A76;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: bold;
            padding-bottom: 15px;
            border-bottom: 2px solid #E8F0FE;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .submenu-title::before {
            content: ""; 
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: #1E4A76;
            border-radius: 2px;
        }
        
        .organ-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        
        .organ-card {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #E2E8F0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        
        .organ-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: #1E4A76;
        }
        
        .organ-name {
            font-weight: bold;
            color: #1E4A76;
            margin-bottom: 16px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .organ-name::before {
            content: "🏥";
            font-size: 16px;
        }
        
        .procedure-list {
            list-style: none;
        }
        
        .procedure-item {
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
        }
        
        .procedure-item::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #1E4A76;
            font-weight: bold;
            font-size: 18px;
        }
        
        .procedure-link {
            color: #0F766E;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .procedure-link:hover {
            color: white;
            background-color: #1E4A76;
            transform: translateX(4px);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            margin-top: 30px;
        }
        
        .empty-state h3 {
            color: #1E4A76;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .empty-state p {
            font-size: 16px;
            line-height: 1.5;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 80%;
            max-width: 1000px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: black;
        }
        
        .procedure-header {
            margin-bottom: 30px;
        }
        
        .procedure-header h2 {
            color: #1E4A76;
            margin-bottom: 10px;
        }
        
        .procedure-header p {
            color: #666;
            margin-bottom: 5px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h3 {
            color: #1E4A76;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .metric-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #1E4A76;
        }
        
        .metric-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .metric-value {
            color: #1E4A76;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .metric-desc {
            font-size: 12px;
            color: #666;
        }
        
        .video-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .video-section {
            flex: 1;
        }
        
        .video-section h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .video-btn {
            padding: 8px 16px;
            background-color: #1E4A76;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .video-btn:hover {
            background-color: #183B60;
        }
        
        .timeline {
            margin-top: 20px;
        }
        
        .timeline-item {
            display: flex;
            margin-bottom: 10px;
        }
        
        .timeline-time {
            width: 80px;
            font-weight: bold;
            color: #1E4A76;
        }
        
        .timeline-action {
            flex: 1;
        }
        
        .competitors-list {
            margin-top: 15px;
        }
        
        .competitor-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #1E4A76;
        }
        
        .competitor-brand {
            font-weight: bold;
            color: #1E4A76;
            margin-bottom: 5px;
        }
        
        .competitor-model {
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .competitor-info {
            margin-bottom: 5px;
        }
        
        .search-results {
            margin-top: 30px;
        }
        
        .search-results h3 {
            color: #1E4A76;
            margin-bottom: 15px;
        }
        
        .result-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .result-type {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .result-name {
            font-weight: bold;
            color: #1E4A76;
            cursor: pointer;
        }
        
        .result-name:hover {
            text-decoration: underline;
        }
        
        /* 登录和注册模态框 */
        #loginModal, #registerModal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        #loginModal .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        #registerModal .modal-content {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #E8F0FE;
        }
        
        #loginModal .modal-content:hover, #registerModal .modal-content:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        
        #loginModal h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1E4A76;
            font-size: 24px;
            font-weight: bold;
            position: relative;
            padding-bottom: 15px;
        }
        
        #loginModal h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #1E4A76, #4A90E2);
            border-radius: 2px;
        }
        
        #registerModal h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1E4A76;
            font-size: 24px;
            font-weight: bold;
            position: relative;
            padding-bottom: 15px;
        }
        
        #registerModal h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #4A90E2, #1E4A76);
            border-radius: 2px;
        }
        
        #loginModal label, #registerModal label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        
        #loginModal input, #registerModal input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E8F0FE;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        
        #loginModal input:focus, #registerModal input:focus {
            outline: none;
            border-color: #1E4A76;
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 74, 118, 0.1);
        }
        
        #loginBtn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1E4A76, #2A68B0);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        #loginBtn:hover {
            background: linear-gradient(135deg, #183B60, #235A91);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 74, 118, 0.3);
        }
        
        #loginBtn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(30, 74, 118, 0.3);
        }
        
        #registerBtn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4A90E2, #6BA5F6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        #registerBtn:hover {
            background: linear-gradient(135deg, #357ABD, #5A90E0);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }
        
        #registerBtn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
        }
        
        #loginError, #registerError {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #FFF2F0;
            color: #D32F2F;
            font-size: 14px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        
        #showRegisterBtn, #showLoginBtn {
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        #showRegisterBtn:hover, #showLoginBtn:hover {
            color: #2A68B0;
        }
        
        #loginError {
            display: none;
            color: red;
            margin-top: 10px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            #searchInput {
                width: 250px;
            }
            
            .main-menu {
                flex-direction: column;
                align-items: stretch;
            }
            
            .menu-item {
                text-align: center;
            }
            
            .submenu-container {
                padding: 20px;
                margin-top: 20px;
            }
            
            .submenu-title {
                font-size: 20px;
                margin-bottom: 20px;
            }
            
            .organ-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .organ-card {
                padding: 20px;
            }
            
            .organ-name {
                font-size: 16px;
            }
            
            .empty-state {
                padding: 60px 20px;
                margin-top: 20px;
            }
            
            .empty-state h3 {
                font-size: 18px;
            }
            
            .empty-state p {
                font-size: 14px;
            }
            
            .video-container {
                flex-direction: column;
            }
            
            .modal-content {
                width: 95%;
                margin: 10% auto;
                padding: 20px;
            }
            
            #loginModal .modal-content {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- 登录模态框 -->
    <div id="loginModal">
        <div class="modal-content">
            <h2>登录系统</h2>
            <div style="margin-bottom: 20px;">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div style="margin-bottom: 30px;">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button id="loginBtn">登录</button>
            <div id="loginError" style="display: none;">用户名或密码错误</div>
            <div style="margin-top: 20px; text-align: center;">
                <span>还没有账号？</span>
                <a href="register.html" style="color: #1E4A76; text-decoration: underline; font-weight: 500;">立即注册</a>
            </div>
        </div>
    </div>
    

    
    <!-- 主界面 -->
    <div class="container" id="mainContent" style="display: none;">
        <h1>手术机器人对标助手</h1>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索科室、术式或品牌...">
            <button id="searchBtn">搜索</button>
        </div>
        
        <div id="searchResults" class="search-results" style="display: none;"></div>
        
        <div class="menu-container">
            <div class="main-menu" id="mainMenu"></div>
            <div class="submenu-container" id="submenuContainer" style="display: none;">
                <h2 class="submenu-title" id="submenuTitle"></h2>

    <script>

        // 登录逻辑
        function initLogin() {
            const loginBtn = document.getElementById('loginBtn');
            const loginModal = document.getElementById('loginModal');
            const mainContent = document.getElementById('mainContent');
            const loginError = document.getElementById('loginError');
            
            // 登录按钮点击事件
            loginBtn.addEventListener('click', function() {
                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;
                
                // 从数据库验证
                fetch('http://localhost:3004/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        isLoggedIn = true;
                        currentUser = username;
                        loginModal.style.display = 'none';
                        mainContent.style.display = 'block';
                        loadDepartments();
                        initHotProcedures();
                        // 如果有提示信息，显示提示
                        if (data.message) {
                            alert(data.message);
                        }
                    } else {
                        loginError.textContent = data.message || '用户名或密码错误';
                        loginError.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('登录失败:', error);
                    loginError.textContent = `系统错误，请稍后重试（${error.message || '网络连接失败'}）`;
                    loginError.style.display = 'block';
                });
            });
        }

        // 加载科室数据 - 创建主菜单
        function loadDepartments() {
            // 使用默认数据
            const data = defaultDepartments;
            const mainMenu = document.getElementById('mainMenu');
            mainMenu.innerHTML = '';
            
            data.forEach(department => {
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                menuItem.textContent = department.name;
                menuItem.dataset.id = department.id;
                menuItem.dataset.name = department.name;
                menuItem.dataset.organs = JSON.stringify(department.organs);
                
                menuItem.addEventListener('click', function() {
                    // 移除所有菜单项的active类
                    document.querySelectorAll('.menu-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    // 添加当前菜单项的active类
                    this.classList.add('active');
                    // 显示二级菜单
                    showSubmenu(department);
                });
                
                mainMenu.appendChild(menuItem);
            });
        }
        
        // 显示二级菜单
        function showSubmenu(department) {
            const submenuContainer = document.getElementById('submenuContainer');
            const submenuTitle = document.getElementById('submenuTitle');
            const organGrid = document.getElementById('organGrid');
            const emptyState = document.getElementById('emptyState');
            
            // 隐藏空状态（如果存在），显示二级菜单
            if (emptyState) {
                emptyState.style.display = 'none';
            }
            submenuContainer.style.display = 'block';
            
            // 设置标题
            submenuTitle.textContent = `${department.name} - 术式分类`;
            
            // 清空器官网格
            organGrid.innerHTML = '';
            
            // 添加器官卡片
            department.organs.forEach(organ => {
                const organCard = document.createElement('div');
                organCard.className = 'organ-card';
                
                organCard.innerHTML = `
                    <div class="organ-name">${organ.name}</div>
                    <ul class="procedure-list">
                        ${organ.procedures.map(procedure => `
                            <li class="procedure-item">
                                <span class="procedure-link" onclick="loadProcedure('${procedure}')">${procedure}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                
                organGrid.appendChild(organCard);
            });
        }

        async function getMCPConfig() {
            if (mcpConfig) return mcpConfig;
            try {
                const response = await fetch('/api/config');
                if (response.ok) {
                    mcpConfig = await response.json();
                    return mcpConfig;
                }
            } catch (error) {
                console.warn('获取配置失败，使用默认配置');
            }
            return { mcpPort: 3003, mcpEnabled: true };
        }
        
        // 从MCP服务器获取术式数据
        async function fetchFromMCP(procedureName) {
            try {
                const config = await getMCPConfig();
                const response = await fetch(`http://localhost:${config.mcpPort}/mcp/tools/get_procedure_data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        procedureName: procedureName
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`MCP服务器响应错误: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    console.log('从MCP服务器成功获取数据:', procedureName);
                    return result.data;
                } else {
                    throw new Error(result.error || 'MCP服务器返回数据无效');
                }
            } catch (error) {
                console.warn('MCP服务器获取失败，将尝试API:', error.message);
                throw error;
            }
        }
        
        // 从API获取术式数据
        async function fetchFromAPI(procedureName) {
            try {
                const response = await fetch(`http://localhost:3004/api/procedures/${encodeURIComponent(procedureName)}`);
                
                if (!response.ok) {
                    throw new Error(`API响应错误: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('从API成功获取数据:', procedureName);
                return data;
            } catch (error) {
                console.warn('API获取失败，将使用默认数据:', error.message);
                throw error;
            }
        }
        
        // 加载术式详情
        async function loadProcedure(procedureName) {
            let procedureData = null;
            
            try {
                // 1. 首先尝试从MCP服务器获取数据
                procedureData = await fetchFromMCP(procedureName);
            } catch (mcpError) {
                try {
                    // 2. MCP失败，尝试从API获取数据
                    procedureData = await fetchFromAPI(procedureName);
                } catch (apiError) {
                    // 3. API也失败，使用默认数据
                    console.error('所有数据源都失败，使用默认数据:', apiError.message);
                    procedureData = getDefaultProcedureData(procedureName);
                }
            }
            
            // 确保数据格式正确
            procedureData = getDefaultProcedureData(procedureName, procedureData);
            
            // 更新页面标题
            document.getElementById('procedureTitle').textContent = `${procedureData.name}详情信息`;
            
            // 填充术式信息
            document.getElementById('procedureName').textContent = procedureData.name;
            document.getElementById('procedureDept').textContent = `科室: ${procedureData.dept}`;
            document.getElementById('procedureOrgan').textContent = `器官: ${procedureData.organ}`;
            document.getElementById('procedureIndications').textContent = procedureData.indications;
            document.getElementById('procedureContraindications').textContent = procedureData.contraindications;
            document.getElementById('guidelineDiff').textContent = procedureData.guidelineDiff;
            
            // 填充临床指标
            const clinicalMetrics = document.getElementById('clinicalMetrics');
            clinicalMetrics.innerHTML = '';
            if (procedureData.clinicalMetrics && Array.isArray(procedureData.clinicalMetrics)) {
                procedureData.clinicalMetrics.forEach(metric => {
                    const metricCard = document.createElement('div');
                    metricCard.style = 'background: #f9f9f9; padding: 20px; border-radius: 12px; border-left: 4px solid #1E4A76; margin-bottom: 15px;';
                    metricCard.innerHTML = `
                        <div style="font-weight: bold; margin-bottom: 8px; color: #333;">${metric.name}</div>
                        <div style="color: #1E4A76; font-size: 18px; margin-bottom: 8px;">${metric.value}</div>
                        <div style="font-size: 14px; color: #666;">${metric.desc}</div>
                    `;
                    clinicalMetrics.appendChild(metricCard);
                });
            }
            
            // 填充手术指标
            const operationMetrics = document.getElementById('operationMetrics');
            operationMetrics.innerHTML = '';
            if (procedureData.operationMetrics && Array.isArray(procedureData.operationMetrics)) {
                procedureData.operationMetrics.forEach(metric => {
                    const metricCard = document.createElement('div');
                    metricCard.style = 'background: #f9f9f9; padding: 20px; border-radius: 12px; border-left: 4px solid #1E4A76; margin-bottom: 15px;';
                    metricCard.innerHTML = `
                        <div style="font-weight: bold; margin-bottom: 8px; color: #333;">${metric.name}</div>
                        <div style="color: #1E4A76; font-size: 18px; margin-bottom: 8px;">${metric.value}</div>
                        <div style="font-size: 14px; color: #666;">${metric.desc}</div>
                    `;
                    operationMetrics.appendChild(metricCard);
                });
            }
            
            // 保存当前手术数据到全局变量
            currentProcedureData = procedureData;
            
            // 填充手术步骤（默认显示传统手术步骤）
            const procedureSteps = document.getElementById('procedureSteps');
            procedureSteps.innerHTML = '';
            const stepsToShow = procedureData.traditionalSteps && Array.isArray(procedureData.traditionalSteps) ? procedureData.traditionalSteps : 
                              (procedureData.steps && Array.isArray(procedureData.steps) ? procedureData.steps : []);
            stepsToShow.forEach(step => {
                const stepItem = document.createElement('div');
                stepItem.style = 'display: flex; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #E2E8F0;';
                stepItem.innerHTML = `
                    <div style="width: 100px; font-weight: bold; color: #1E4A76; font-size: 16px;">${step.timestamp}s</div>
                    <div style="flex: 1; font-size: 16px; color: #333;">${step.name}</div>
                `;
                procedureSteps.appendChild(stepItem);
            });
            
            // 设置视频源
            document.getElementById('traditionalVideo').src = getVideoUrl(procedureName, 'traditional');
            document.getElementById('roboticVideo').src = getVideoUrl(procedureName, 'robotic');
            
            // 加载竞品数据
            loadCompetitors(procedureName);
            
            // 隐藏主界面，显示术式详情界面
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('procedurePage').style.display = 'block';
        }

        // 加载竞品数据

                .then(data => {
                    const competitorsList = document.getElementById('competitorsList');

                    // 检查当前用户是否为admin，如果是则显示更新按钮

                        updateBtn.style.display = 'block';

                        updateBtn.onclick = function() {
                            updateCompetitorsData(procedureName);
                        };
                    } else {
                        updateBtn.style.display = 'none';
                    }
                    
                    competitorsList.innerHTML = '';
                    
                    // 过滤掉型号为"未知型号"的数据
                    const filteredData = data && Array.isArray(data) ? data.filter(item => item.model !== '未知型号') : [];

        // 显示通知弹窗
        function showNotification(message, type = 'info', duration = 3000) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = type;
            
            // 显示通知
            notification.classList.add('show');
            
            // 3秒后自动隐藏
            setTimeout(() => {
                notification.classList.remove('show');
                // 淡出效果
                setTimeout(() => {
                    notification.className = '';
                }, 300);
            }, duration);
        }
        
        // 更新竞品数据
        function updateCompetitorsData(procedureName) {
            // 显示加载状态
            const updateBtn = document.getElementById('updateCompetitorsBtn');
            const originalText = updateBtn.textContent;
            updateBtn.textContent = '检查中...';
            updateBtn.disabled = true;
            
            // 显示加载通知
            showNotification('正在检查新数据...', 'loading', 5000);
            
            // 调用后端API获取新数据（不直接更新）
            fetch('/api/competitors/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ procedureName, username: currentUser, preview: true })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.isUpToDate) {
                        // 数据已经是最新的
                        showNotification(data.message || '当前数据已经是最新版', 'info', 3000);
                        updateBtn.textContent = originalText;
                        updateBtn.disabled = false;
                    } else {
                        // 有新数据，显示预览
                        showNotification('检测到新的数据，正在显示预览...', 'info', 2000);
                        
                        // 临时存储新数据
                        window.tempCompetitorsData = data.competitors;
                        window.currentProcedureName = procedureName;
                        
                        // 显示新数据预览
                        displayCompetitorsPreview(data.competitors);
                        
                        // 替换更新按钮为确认/拒绝按钮
                        replaceUpdateBtnWithConfirmation();
                    }
                } else {
                    showNotification('检查数据失败：' + (data.error || '未知错误'), 'info', 3000);
                    updateBtn.textContent = originalText;
                    updateBtn.disabled = false;
                }
            })
            .catch(error => {
                console.error('检查竞品数据失败:', error);
                showNotification('检查数据失败，请稍后重试', 'info', 3000);
                updateBtn.textContent = originalText;
                updateBtn.disabled = false;
            });
        }

            // 清空父元素
            parentElement.innerHTML = '';
            
            // 创建按钮容器

            rejectBtn.addEventListener('click', rejectUpdate);
            
            // 添加按钮和信息到按钮容器
            buttonContainer.appendChild(confirmBtn);
            buttonContainer.appendChild(rejectBtn);

        // 确认更新
        function confirmUpdate() {
            const procedureName = window.currentProcedureName;
            if (!procedureName || !window.tempCompetitorsData) {
                showNotification('更新数据失败：缺少必要参数', 'info', 3000);
                return;
            }
            
            // 显示加载状态
            const confirmBtn = document.getElementById('confirmUpdateBtn');
            const rejectBtn = document.getElementById('rejectUpdateBtn');
            confirmBtn.textContent = '更新中...';
            confirmBtn.disabled = true;
            rejectBtn.disabled = true;
            
            // 显示加载通知
            showNotification('数据正在更新中...', 'loading', 5000);
            
            // 调用后端API更新数据
            fetch('/api/competitors/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ procedureName, username: currentUser, confirm: true })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification('数据更新成功！', 'success', 2000);
                    // 恢复更新按钮
                    restoreUpdateBtn(procedureName);
                    // 重新加载数据
                    setTimeout(() => {
                        loadCompetitors(procedureName);
                    }, 1000);
                } else {
                    showNotification('数据更新失败：' + (data.error || '未知错误'), 'info', 3000);
                    // 恢复更新按钮
                    restoreUpdateBtn(procedureName);
                }
            })
            .catch(error => {
                console.error('更新竞品数据失败:', error);
                showNotification('数据更新失败，请稍后重试', 'info', 3000);
                // 恢复更新按钮
                restoreUpdateBtn(procedureName);
            });
        }
        
        // 拒绝更新
        function rejectUpdate() {
            const procedureName = window.currentProcedureName;
            // 显示通知
            showNotification('已取消数据更新', 'info', 2000);
            // 恢复更新按钮
            restoreUpdateBtn(procedureName);
            // 重新加载原始数据
            loadCompetitors(procedureName);
        }

        // 搜索功能
        function initSearch() {
            const searchBtn = document.getElementById('searchBtn');
            const searchInput = document.getElementById('searchInput');
            
            searchBtn.addEventListener('click', function() {
                const keyword = searchInput.value.trim();
                if (keyword) {
                    // 跳转到搜索结果页面
                    window.location.href = `/search.html?keyword=${encodeURIComponent(keyword)}`;
                }
            });
            
            // 回车键搜索
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchBtn.click();
                }
            });
        }
        
        // 加载科室详情
        function loadDepartment(deptId) {
                      fetch(`/api/departments/${deptId}`)
                .then(response => response.json())
                .then(data => {
                    // 移除所有菜单项的active类
                    document.querySelectorAll('.menu-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    // 激活对应的菜单项
                    const menuItem = document.querySelector(`.menu-item[data-id="${deptId}"]`);
                    if (menuItem) {
                        menuItem.classList.add('active');
                    }
                    // 显示二级菜单
                    showSubmenu(data);
                    // 隐藏搜索结果
                    document.getElementById('searchResults').style.display = 'none';
                })
                .catch(error => {
                    console.error('Error loading department:', error);
                });
        }

        // 初始化返回按钮
        function initBackButton() {
            const backBtn = document.getElementById('backBtn');
            backBtn.addEventListener('click', function() {
                // 隐藏术式详情界面，显示主界面
                document.getElementById('procedurePage').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            });
        }
        
        // 初始化页面导航
        function initPageNavigation() {
            const navBtns = document.querySelectorAll('.nav-btn');
            const pages = {
                'details': document.getElementById('detailsPage'),
                'videos': document.getElementById('videosPage'),
                'competitors': document.getElementById('competitorsPage')
            };
            
            navBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除所有导航按钮的active类
                    navBtns.forEach(b => {
                        b.classList.remove('active');
                        b.style.background = '#f9f9f9';
                        b.style.color = '#333';
                    });
                    
                    // 添加当前按钮的active类
                    this.classList.add('active');
                    this.style.background = '#1E4A76';
                    this.style.color = 'white';
                    
                    // 隐藏所有页面
                    Object.values(pages).forEach(page => {
                        page.style.display = 'none';
                    });
                    
                    // 显示当前页面
                    const pageId = this.dataset.page;
                    if (pages[pageId]) {
                        pages[pageId].style.display = 'block';
                    }
                });
            });
        }

        function initMetricsToggle() {
            const clinicalBtn = document.getElementById('clinicalBtn');

            const operationSection = document.getElementById('operationMetricsSection');
            
            if (clinicalBtn && operationBtn && clinicalSection && operationSection) {

                    // 取消激活手术指标按钮

        // 初始化视频类型切换
        function initVideoTypeToggle() {
            const traditionalBtn = document.getElementById('traditionalVideoBtn');
            const roboticBtn = document.getElementById('roboticVideoBtn');
            const traditionalSection = document.getElementById('traditionalVideoSection');
            const roboticSection = document.getElementById('roboticVideoSection');
            
            if (traditionalBtn && roboticBtn && traditionalSection && roboticSection) {
                traditionalBtn.addEventListener('click', function() {
                    // 激活传统手术按钮
                    traditionalBtn.classList.add('active');
                    traditionalBtn.style.background = '#1E4A76';
                    traditionalBtn.style.color = 'white';
                    
                    // 取消激活机器人手术按钮
                    roboticBtn.classList.remove('active');
                    roboticBtn.style.background = '#f9f9f9';
                    roboticBtn.style.color = '#333';
                    
                    // 显示传统手术视频，隐藏机器人手术视频
                    traditionalSection.style.display = 'block';
                    roboticSection.style.display = 'none';
                    
                    // 更新手术步骤为传统手术步骤
                    if (currentProcedureData) {
                        const procedureSteps = document.getElementById('procedureSteps');
                        procedureSteps.innerHTML = '';
                        const stepsToShow = currentProcedureData.traditionalSteps && Array.isArray(currentProcedureData.traditionalSteps) ? currentProcedureData.traditionalSteps : 
                                          (currentProcedureData.steps && Array.isArray(currentProcedureData.steps) ? currentProcedureData.steps : []);
                        stepsToShow.forEach(step => {
                            const stepItem = document.createElement('div');
                            stepItem.style = 'display: flex; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #E2E8F0;';
                            stepItem.innerHTML = `
                                <div style="width: 100px; font-weight: bold; color: #1E4A76; font-size: 16px;">${step.timestamp}s</div>
                                <div style="flex: 1; font-size: 16px; color: #333;">${step.name}</div>
                            `;
                            procedureSteps.appendChild(stepItem);
                        });
                    }
                });
                
                roboticBtn.addEventListener('click', function() {
                    // 激活机器人手术按钮
                    roboticBtn.classList.add('active');
                    roboticBtn.style.background = '#1E4A76';
                    roboticBtn.style.color = 'white';
                    
                    // 取消激活传统手术按钮
                    traditionalBtn.classList.remove('active');
                    traditionalBtn.style.background = '#f9f9f9';
                    traditionalBtn.style.color = '#333';
                    
                    // 显示机器人手术视频，隐藏传统手术视频
                    roboticSection.style.display = 'block';
                    traditionalSection.style.display = 'none';
                    
                    // 更新手术步骤为机器人手术步骤
                    if (currentProcedureData) {
                        const procedureSteps = document.getElementById('procedureSteps');
                        procedureSteps.innerHTML = '';
                        const stepsToShow = currentProcedureData.roboticSteps && Array.isArray(currentProcedureData.roboticSteps) ? currentProcedureData.roboticSteps : 
                                          (currentProcedureData.steps && Array.isArray(currentProcedureData.steps) ? currentProcedureData.steps : []);
                        stepsToShow.forEach(step => {
                            const stepItem = document.createElement('div');
                            stepItem.style = 'display: flex; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #E2E8F0;';
                            stepItem.innerHTML = `
                                <div style="width: 100px; font-weight: bold; color: #1E4A76; font-size: 16px;">${step.timestamp}s</div>
                                <div style="flex: 1; font-size: 16px; color: #333;">${step.name}</div>
                            `;
                            procedureSteps.appendChild(stepItem);
                        });
                    }
                });
            }
        }
